{% extends "base.html" %}

{% block content %}

<div class="text-center mb-4">
    <h1>🎭 Telonautas</h1>
    <p class="text-muted">Asociación Cultural sin Ánimo de Lucro</p>
    <p><a href="https://www.instagram.com/telonautasteatro" target="_blank" class="text-decoration-none">📸 @telonautasteatro</a></p>
</div>

<hr class="my-4">

<div class="text-center mb-4">
    <h2>Reserva de entrada</h2>
    <p>Función gratuita con aforo limitado.<br>Aceptamos donaciones en efectivo el día del evento.</p>
</div>

<div class="row justify-content-center">
	<div class="col-md-6">

		<div class="card p-4 shadow">

			<form action="/reserve" method="post">

                {% if error %}
                    <div class="alert alert-warning" role="alert">
                        {{error}}
                    </div>
                {% endif %}

				<div class="mb-3">
				<label class="form-label">Nombre</label>
				<input type="text" name="name" class="form-control" required>
				</div>

				<div class="mb-3">
				<label class="form-label">Email</label>
				<input type="email" name="email" class="form-control" required>
				</div>

				<div class="mb-3">
				<label class="form-label">Día</label>
				<select name="day" class="form-select" required>
                    <option value="1">Día 1 - 29 de Mayo</option>
                    <option value="2">Día 2 - 30 de Mayo</option>
				</select>
				</div>

				<button type="submit" class="btn btn-primary w-100">
					Reservar entrada
				</button>
			</form>

		</div>

	</div>
</div>

{% endblock %}
